apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: express
  template:
    metadata:
      labels:
        app: express
    spec:
      containers:
      - name: express-container
        image: darshanwalher/cohort_2_express:latest
        imagePullPolicy: IfNotPresent  
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "128Mi" #128 megabytes
            cpu: "500m" #500 millicores
          requests:
            memory: "64Mi" #64 megabytes
            cpu: "250m" #250 millicores